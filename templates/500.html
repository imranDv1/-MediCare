<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f9f9f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a18;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        .error-icon {
            width: 120px;
            height: 120px;
            background: #f4f4f2;
            border: 1px solid #e5e5e3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 60px;
            color: #9a9a94;
        }
        h1 { font-size: 72px; font-weight: 500; margin-bottom: 10px; letter-spacing: -0.03em; }
        h2 { font-size: 24px; font-weight: 500; margin-bottom: 15px; }
        p { font-size: 16px; color: #6b6b66; margin-bottom: 30px; line-height: 1.6; }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 40px;
            padding: 0 20px;
            background: #1a1a18;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border: none;
            cursor: pointer;
        }
        .btn-home:hover { background: #2a2a28; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-bug"></i>
        </div>
        <h1>500</h1>
        <h2>Server Error</h2>
        <p>Something went wrong on our end. Our team has been notified. Please try again later.</p>
        <a href="{% url 'dashboard' %}" class="btn-home">
            <i class="fas fa-arrow-left"></i>Back to Dashboard
        </a>
    </div>
</body>
</html>
