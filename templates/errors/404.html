<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-subtle, #f4f4f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary, #1a1a18);
        }
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        .error-icon {
            width: 120px;
            height: 120px;
            background: var(--bg-surface, #ffffff);
            border: 1px solid var(--border, #e5e5e0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 60px;
            color: var(--text-muted, #a8a8a2);
        }
        h1 { font-size: 72px; font-weight: 500; margin-bottom: 10px; }
        h2 { font-size: 24px; font-weight: 500; margin-bottom: 15px; }
        p { font-size: 16px; color: var(--text-muted, #a8a8a2); margin-bottom: 30px; line-height: 1.6; }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 20px;
            height: 40px;
            background: var(--primary, #1a1a18);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-home:hover { background: #2a2a28; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="{% url 'dashboard' %}" class="btn-home">
            <i class="fas fa-arrow-left"></i>Back to Dashboard
        </a>
    </div>
</body>
</html>
