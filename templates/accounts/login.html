{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="{% static 'logo.png' %}" alt="MediCare" class="login-logo-img">
            <h1>MediCare</h1>
            <p>Medicine Management System</p>
        </div>

        {% if messages %}
        <div style="margin-bottom:20px;">
            {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %}">
                <span class="alert-icon"><i class="fas fa-info-circle"></i></span>
                <div>{{ message }}</div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% if form.errors %}
        <div style="margin-bottom:20px;">
            <div class="alert alert-danger">
                <span class="alert-icon"><i class="fas fa-exclamation-circle"></i></span>
                <div>Invalid username or password. Please try again.</div>
            </div>
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom:18px;">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            <div style="margin-bottom:18px;">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;height:38px;justify-content:center;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border-default);">
            <p style="font-size:12px;color:var(--text-tertiary);margin:0;"><i class="fas fa-heart" style="color:var(--text-tertiary);margin:0 3px;"></i> MediCare Management System v1.0</p>
        </div>
    </div>
</body>
</html>
